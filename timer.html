<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>倒计时器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --text: #e0e0e0;
  --text-dim: #7a8ba6;
  --input-bg: #0f1a2e;
  --input-border: #2a3a5c;
  --input-focus: #4cc9f0;
  --ring-bg: #1f3050;
  --ring-fg: #4cc9f0;
  --ring-finish: #f72585;
  --btn-start: #4cc9f0;
  --btn-start-text: #0f1a2e;
  --btn-start-hover: #3db8df;
  --btn-pause: #f8961e;
  --btn-pause-text: #0f1a2e;
  --btn-pause-hover: #e08518;
  --btn-reset: #2a3a5c;
  --btn-reset-text: #c0c0c0;
  --btn-reset-hover: #3a4a6c;
  --preset-border: #2a3a5c;
  --preset-text: #7a8ba6;
  --preset-hover-bg: #2a3a5c;
  --preset-hover-text: #fff;
  --alarm-bg: #f72585;
  --alarm-text: #fff;
  --shadow: rgba(0,0,0,0.4);
}

/* 海洋蓝（默认） */
[data-theme="blue"] {
  --bg: #1a1a2e;
  --card: #16213e;
  --text: #e0e0e0;
  --text-dim: #7a8ba6;
  --input-bg: #0f1a2e;
  --input-border: #2a3a5c;
  --input-focus: #4cc9f0;
  --ring-bg: #1f3050;
  --ring-fg: #4cc9f0;
  --ring-finish: #f72585;
  --btn-start: #4cc9f0;
  --btn-start-text: #0f1a2e;
  --btn-start-hover: #3db8df;
  --btn-pause: #f8961e;
  --btn-pause-text: #0f1a2e;
  --btn-pause-hover: #e08518;
  --btn-reset: #2a3a5c;
  --btn-reset-text: #c0c0c0;
  --btn-reset-hover: #3a4a6c;
  --preset-border: #2a3a5c;
  --preset-text: #7a8ba6;
  --preset-hover-bg: #2a3a5c;
  --preset-hover-text: #fff;
  --alarm-bg: #f72585;
  --alarm-text: #fff;
  --shadow: rgba(0,0,0,0.4);
}

/* 森林绿 */
[data-theme="green"] {
  --bg: #1a2e1f;
  --card: #1a3320;
  --text: #d4e8d0;
  --text-dim: #7a9e72;
  --input-bg: #0f1f12;
  --input-border: #2d4a30;
  --input-focus: #4ade80;
  --ring-bg: #1f4028;
  --ring-fg: #4ade80;
  --ring-finish: #f87171;
  --btn-start: #4ade80;
  --btn-start-text: #0f1f12;
  --btn-start-hover: #3cc06a;
  --btn-pause: #fbbf24;
  --btn-pause-text: #0f1f12;
  --btn-pause-hover: #e0a820;
  --btn-reset: #2d4a30;
  --btn-reset-text: #b0c8a8;
  --btn-reset-hover: #3d5a40;
  --preset-border: #2d4a30;
  --preset-text: #7a9e72;
  --preset-hover-bg: #2d4a30;
  --preset-hover-text: #d4e8d0;
  --alarm-bg: #f87171;
  --alarm-text: #fff;
  --shadow: rgba(0,0,0,0.4);
}

/* 日暮橙 */
[data-theme="orange"] {
  --bg: #2e2218;
  --card: #33251a;
  --text: #f0d8b8;
  --text-dim: #b8956e;
  --input-bg: #1f160e;
  --input-border: #4a3525;
  --input-focus: #fb923c;
  --ring-bg: #3d2a1a;
  --ring-fg: #fb923c;
  --ring-finish: #ef4444;
  --btn-start: #fb923c;
  --btn-start-text: #1f160e;
  --btn-start-hover: #e07d2a;
  --btn-pause: #facc15;
  --btn-pause-text: #1f160e;
  --btn-pause-hover: #e0b810;
  --btn-reset: #4a3525;
  --btn-reset-text: #c8a888;
  --btn-reset-hover: #5a4535;
  --preset-border: #4a3525;
  --preset-text: #b8956e;
  --preset-hover-bg: #4a3525;
  --preset-hover-text: #f0d8b8;
  --alarm-bg: #ef4444;
  --alarm-text: #fff;
  --shadow: rgba(0,0,0,0.4);
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: var(--bg);
  font-family: 'Segoe UI', system-ui, sans-serif;
}

.container {
  text-align: center;
  padding: 48px 40px;
  border-radius: 24px;
  background: var(--card);
  box-shadow: 0 20px 60px var(--shadow);
}

.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}

h1 {
  color: var(--text);
  font-size: 28px;
  font-weight: 600;
}

.theme-picker {
  display: flex;
  gap: 8px;
}

.theme-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}

.theme-dot:hover {
  transform: scale(1.15);
}

.theme-dot.active {
  border-color: var(--text);
  box-shadow: 0 0 10px rgba(255,255,255,0.3);
}

.theme-dot.blue  { background: #4cc9f0; }
.theme-dot.green { background: #4ade80; }
.theme-dot.orange { background: #fb923c; }

.ring-wrapper {
  position: relative;
  width: 280px;
  height: 280px;
  margin: 24px auto;
}

.ring-wrapper svg {
  transform: rotate(-90deg);
  width: 100%;
  height: 100%;
}

.ring-bg {
  fill: none;
  stroke: var(--ring-bg);
  stroke-width: 10;
}

.ring-progress {
  fill: none;
  stroke: var(--ring-fg);
  stroke-width: 10;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.3s linear;
}

.ring-progress.finishing {
  stroke: var(--ring-finish);
}

.time-display {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: var(--text);
  font-size: 56px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: 2px;
}

.input-group {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
}

.input-group input {
  width: 64px;
  padding: 10px 4px;
  text-align: center;
  font-size: 20px;
  font-weight: 600;
  border: 2px solid var(--input-border);
  border-radius: 10px;
  background: var(--input-bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}

.input-group input:focus {
  border-color: var(--input-focus);
}

.input-group span {
  color: var(--text-dim);
  font-size: 18px;
  font-weight: 500;
}

.presets {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.presets button {
  padding: 6px 16px;
  border: 1px solid var(--preset-border);
  border-radius: 20px;
  background: transparent;
  color: var(--preset-text);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}

.presets button:hover {
  background: var(--preset-hover-bg);
  color: var(--preset-hover-text);
}

.controls {
  display: flex;
  justify-content: center;
  gap: 12px;
}

.controls button {
  padding: 12px 36px;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-start {
  background: var(--btn-start);
  color: var(--btn-start-text);
}

.btn-start:hover {
  background: var(--btn-start-hover);
}

.btn-pause {
  background: var(--btn-pause);
  color: var(--btn-pause-text);
}

.btn-pause:hover {
  background: var(--btn-pause-hover);
}

.btn-reset {
  background: var(--btn-reset);
  color: var(--btn-reset-text);
}

.btn-reset:hover {
  background: var(--btn-reset-hover);
}

.alarm-toast {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--alarm-bg);
  color: var(--alarm-text);
  font-size: 36px;
  font-weight: 700;
  padding: 24px 48px;
  border-radius: 16px;
  box-shadow: 0 0 80px rgba(247, 37, 133, 0.6);
  animation: pulse 0.6s ease-in-out infinite;
  z-index: 100;
}

.alarm-toast.show {
  display: block;
}

@keyframes pulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -50%) scale(1.08); }
}

body.alarming .container {
  animation: shake 0.4s ease-in-out;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}
</style>
</head>
<body>

<div class="container">
  <div class="header-row">
    <h1>倒计时器</h1>
    <div class="theme-picker">
      <button class="theme-dot blue active" data-theme="blue" title="海洋蓝"></button>
      <button class="theme-dot green" data-theme="green" title="森林绿"></button>
      <button class="theme-dot orange" data-theme="orange" title="日暮橙"></button>
    </div>
  </div>

  <div class="ring-wrapper" id="ringWrapper">
    <svg viewBox="0 0 280 280">
      <circle class="ring-bg" cx="140" cy="140" r="130"/>
      <circle class="ring-progress" id="ring" cx="140" cy="140" r="130"
              stroke-dasharray="816.8" stroke-dashoffset="0"/>
    </svg>
    <div class="time-display" id="display">00:00</div>
  </div>

  <div class="input-group">
    <input type="number" id="inH" value="0" min="0" max="99" placeholder="时">
    <span>时</span>
    <input type="number" id="inM" value="3" min="0" max="59" placeholder="分">
    <span>分</span>
    <input type="number" id="inS" value="0" min="0" max="59" placeholder="秒">
    <span>秒</span>
  </div>

  <div class="presets">
    <button data-m="1">1 分钟</button>
    <button data-m="3">3 分钟</button>
    <button data-m="5">5 分钟</button>
    <button data-m="10">10 分钟</button>
    <button data-m="25">25 分钟</button>
    <button data-m="60">60 分钟</button>
  </div>

  <div class="controls">
    <button class="btn-start" id="btnStart">开始</button>
    <button class="btn-pause" id="btnPause" style="display:none">暂停</button>
    <button class="btn-reset" id="btnReset">重置</button>
  </div>
</div>

<div class="alarm-toast" id="alarmToast">⏰ 时间到！</div>

<script>
const display = document.getElementById('display');
const ring = document.getElementById('ring');
const btnStart = document.getElementById('btnStart');
const btnPause = document.getElementById('btnPause');
const btnReset = document.getElementById('btnReset');
const alarmToast = document.getElementById('alarmToast');
const inH = document.getElementById('inH');
const inM = document.getElementById('inM');
const inS = document.getElementById('inS');

const CIRCUMFERENCE = 2 * Math.PI * 130; // ~816.8

let totalSeconds = 180; // default 3 minutes
let remaining = 180;
let timerId = null;
let isPaused = false;

function formatTime(s) {
  const sign = s < 0 ? '-' : '';
  const abs = Math.abs(s);
  const h = Math.floor(abs / 3600);
  const m = Math.floor((abs % 3600) / 60);
  const sec = abs % 60;
  if (h > 0) {
    return sign + String(h).padStart(2,'0') + ':' +
           String(m).padStart(2,'0') + ':' +
           String(sec).padStart(2,'0');
  }
  return sign + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function updateDisplay() {
  display.textContent = formatTime(remaining);

  const fraction = totalSeconds > 0 ? remaining / totalSeconds : 0;
  ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);

  if (remaining <= 10 && remaining > 0) {
    ring.classList.add('finishing');
  } else {
    ring.classList.remove('finishing');
  }
}

function readInput() {
  const h = parseInt(inH.value) || 0;
  const m = parseInt(inM.value) || 0;
  const s = parseInt(inS.value) || 0;
  return Math.max(0, h * 3600 + m * 60 + s);
}

function setFromInput() {
  totalSeconds = readInput();
  remaining = totalSeconds;
  updateDisplay();
}

function setPreset(minutes) {
  inH.value = 0;
  inM.value = minutes;
  inS.value = 0;
  totalSeconds = minutes * 60;
  remaining = totalSeconds;
  updateDisplay();
}

function stopAlarm() {
  alarmToast.classList.remove('show');
  document.body.classList.remove('alarming');
}

function finish() {
  clearInterval(timerId);
  timerId = null;
  remaining = 0;
  updateDisplay();
  alarmToast.classList.add('show');
  document.body.classList.add('alarming');

  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'square';
    osc.frequency.value = 880;
    gain.gain.value = 0.15;
    osc.start();
    setTimeout(() => {
      osc.frequency.value = 660;
      setTimeout(() => osc.stop(), 200);
    }, 200);
  } catch(e) {}

  btnStart.style.display = 'inline-block';
  btnStart.textContent = '开始';
  btnPause.style.display = 'none';
  isPaused = false;
}

btnStart.addEventListener('click', () => {
  stopAlarm();

  if (isPaused) {
    // Resume
    isPaused = false;
    btnPause.style.display = 'inline-block';
    btnStart.textContent = '开始';
    btnStart.style.display = 'none';
    timerId = setInterval(tick, 1000);
    return;
  }

  // Fresh start
  stopAlarm();
  const input = readInput();
  if (input === 0) return;
  totalSeconds = input;
  remaining = totalSeconds;
  updateDisplay();

  btnStart.style.display = 'none';
  btnPause.style.display = 'inline-block';
  timerId = setInterval(tick, 1000);
});

btnPause.addEventListener('click', () => {
  clearInterval(timerId);
  timerId = null;
  isPaused = true;
  btnPause.style.display = 'none';
  btnStart.style.display = 'inline-block';
  btnStart.textContent = '继续';
});

btnReset.addEventListener('click', () => {
  stopAlarm();
  clearInterval(timerId);
  timerId = null;
  isPaused = false;
  setFromInput();
  btnStart.style.display = 'inline-block';
  btnStart.textContent = '开始';
  btnPause.style.display = 'none';
});

function tick() {
  remaining--;
  updateDisplay();
  if (remaining <= 0) finish();
}

// Presets
document.querySelectorAll('.presets button').forEach(btn => {
  btn.addEventListener('click', () => {
    stopAlarm();
    clearInterval(timerId);
    timerId = null;
    isPaused = false;
    setPreset(parseInt(btn.dataset.m));
    btnStart.style.display = 'inline-block';
    btnStart.textContent = '开始';
    btnPause.style.display = 'none';
  });
});

// Input changes
[inH, inM, inS].forEach(el => {
  el.addEventListener('input', () => {
    stopAlarm();
    clearInterval(timerId);
    timerId = null;
    isPaused = false;
    setFromInput();
    btnStart.style.display = 'inline-block';
    btnStart.textContent = '开始';
    btnPause.style.display = 'none';
  });
});

// Click toast to dismiss
alarmToast.addEventListener('click', stopAlarm);

// Theme switching
const themeDots = document.querySelectorAll('.theme-dot');
const saved = localStorage.getItem('timer-theme') || 'blue';
document.documentElement.setAttribute('data-theme', saved);
themeDots.forEach(dot => {
  dot.classList.toggle('active', dot.dataset.theme === saved);
  dot.addEventListener('click', () => {
    const theme = dot.dataset.theme;
    document.documentElement.setAttribute('data-theme', theme);
    themeDots.forEach(d => d.classList.remove('active'));
    dot.classList.add('active');
    localStorage.setItem('timer-theme', theme);
  });
});

// Init
ring.style.strokeDasharray = CIRCUMFERENCE;
ring.style.strokeDashoffset = '0';
setPreset(3);
</script>
</body>
</html>
